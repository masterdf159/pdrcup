name: diag
on: { workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: probar fuente
        run: |
          echo "HTTP=$(curl -s -o /tmp/g.json -w '%{http_code}' --max-time 25 -H 'User-Agent: Mozilla/5.0' https://worldcup26.ir/get/games)" > diag.txt
          echo "BYTES=$(wc -c < /tmp/g.json 2>/dev/null || echo 0)" >> diag.txt
          echo "HEAD=$(head -c 60 /tmp/g.json 2>/dev/null)" >> diag.txt
      - name: commit
        run: |
          git config user.name bot; git config user.email bot@x.com
          git add diag.txt; git commit -m "diag" || true; git push || true
